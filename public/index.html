<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login / Signup</title>
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
    <link rel="stylesheet" href="login.css" />
</head>

<body>
    <div id="notification" class="notification"></div>
    <div class="container">
        
        <div class="form-box login">
            <form id="login-form">
                <h1>Login</h1>
                <div class="input-box">
                    <div class="indicator">Email Address:</div>
                    <input type="email" id="login-email" placeholder="Email" required />
                </div>
                <div class="input-box">
                    <div class="indicator">Password:</div>
                    <input type="password" id="login-password" placeholder="Password" required />
                </div>
                <div class="forgot-link">
                    <a href="#">Forgot Password?</a>
                </div>
                <button type="submit" class="btn">Login</button>
            </form>
        </div>

        <div class="form-box register">
            <form id="register-form">
                <h1>Registration</h1>
                <div class="input-box">
                    <div class="indicator">Username:</div>
                    <input type="text" id="register-name" placeholder="Username" required />
                </div>
                <div class="input-box">
                    <div class="indicator">Email Address:</div>
                    <input type="email" id="register-email" placeholder="Email" required />
                </div>
                <div class="input-box">
                    <div class="indicator">Password:</div>
                    <input type="password" id="register-password" placeholder="Password" required />
                </div>
                <div class="input-box">
                    <div class="indicator">Confirm Password:</div>
                    <input type="password" id="register-confirm-password" placeholder="Confirm Password" required />
                </div>
                <button type="submit" class="btn">Register</button>
            </form>
        </div>

        <div class="toggle-box">
            <div class="toggle-panel toggle-left">
                <h1>Hello, Welcome!</h1>
                <p>Don't have an account?</p>
                <button class="btn register-btn">Register</button>
            </div>
            <div class="toggle-panel toggle-right">
                <h1>Welcome Back!</h1>
                <p>Already have an account?</p>
                <button class="btn login-btn">Login</button>
            </div>
        </div>
    </div>

    <script src="login.js"></script>
</body>

</html>
